<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="18" fill="#0f172a"/>

  <!-- Logo in silver/white -->
  <g stroke="#c8d3e0" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer ring: 4 arc segments -->
    <path d="M91.9 52.9 A42 42 0 0 1 52.9 91.9" stroke-width="3.5"/>
    <path d="M47.1 91.9 A42 42 0 0 1 8.1 52.9" stroke-width="3.5"/>
    <path d="M8.1 47.1 A42 42 0 0 1 47.1 8.1" stroke-width="3.5"/>
    <path d="M52.9 8.1 A42 42 0 0 1 91.9 47.1" stroke-width="3.5"/>

    <!-- Inner C-arc -->
    <path d="M76.6 45.3 A27 27 0 1 1 54.7 76.6" stroke-width="3"/>

    <!-- Circuit notch -->
    <path d="M76.6 45.3 L76.6 37.5" stroke-width="3"/>

    <!-- Center circle -->
    <circle cx="50" cy="50" r="7" stroke-width="3"/>

    <!-- Vertical axis -->
    <line x1="50" y1="0" x2="50" y2="43" stroke-width="2.8"/>
    <line x1="50" y1="57" x2="50" y2="90" stroke-width="2.8"/>

    <!-- Top dots -->
    <circle cx="50" cy="2.5" r="1.8" fill="#c8d3e0" stroke="none"/>
    <circle cx="50" cy="7.5" r="2.4" fill="#c8d3e0" stroke="none"/>

    <!-- Bottom fork -->
    <path d="M44 86.5 L50 92 L56 86.5" stroke-width="2.5" fill="none"/>

    <!-- Crosshairs -->
    <line x1="8" y1="50" x2="23" y2="50" stroke-width="2.8"/>
    <line x1="77" y1="50" x2="92" y2="50" stroke-width="2.8"/>
  </g>
</svg>
